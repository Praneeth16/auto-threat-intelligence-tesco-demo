<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="Inter, system-ui, sans-serif">
  <rect width="920" height="560" fill="#0f1420"/>
  <text x="40" y="44" fill="#eef2fb" font-size="22" font-weight="700" font-family="Space Grotesk, sans-serif">Platform estate</text>
  <text x="40" y="66" fill="#9aa6c4" font-size="13">One Unity Catalog governed workspace. Coral human surface, teal data plane, purple AI plane.</text>

  <!-- workspace container -->
  <rect x="30" y="86" width="860" height="440" rx="16" fill="none" stroke="#2a3450" stroke-width="1.5"/>
  <text x="50" y="110" fill="#5f6b8a" font-size="12" font-family="JetBrains Mono, monospace">Unity Catalog workspace</text>

  <!-- SOC team entering from outside (human, coral) -->
  <rect x="360" y="18" width="200" height="0" fill="none"/>
  <g>
    <rect x="360" y="470" width="200" height="44" rx="10" fill="#161d2e" stroke="#ff6b5c" stroke-width="1.5"/>
    <text x="460" y="497" fill="#ff6b5c" font-size="13" text-anchor="middle" font-weight="600">SOC team</text>
  </g>

  <!-- App (human surface) -->
  <rect x="60" y="130" width="360" height="70" rx="10" fill="#161d2e" stroke="#ff6b5c" stroke-width="1.5"/>
  <text x="80" y="160" fill="#ff6b5c" font-size="14" font-weight="600">Databricks App</text>
  <text x="80" y="182" fill="#9aa6c4" font-size="12">React + FastAPI, SSE, four views</text>

  <!-- Lakebase (data) -->
  <rect x="60" y="230" width="360" height="64" rx="10" fill="#161d2e" stroke="#00b39f" stroke-width="1.5"/>
  <text x="80" y="258" fill="#00b39f" font-size="14" font-weight="600">Lakebase (Postgres)</text>
  <text x="80" y="280" fill="#9aa6c4" font-size="12">queue, decisions, feedback, policy, replay</text>

  <!-- Lakeflow + Delta (data) -->
  <rect x="60" y="324" width="360" height="64" rx="10" fill="#161d2e" stroke="#00b39f" stroke-width="1.5"/>
  <text x="80" y="352" fill="#00b39f" font-size="14" font-weight="600">Lakeflow + Delta</text>
  <text x="80" y="374" fill="#9aa6c4" font-size="12">bronze, silver, gold; enrichment + scoring</text>

  <!-- Agent Bricks (AI) -->
  <rect x="500" y="130" width="360" height="70" rx="10" fill="#161d2e" stroke="#8b7cf6" stroke-width="1.5"/>
  <text x="520" y="160" fill="#8b7cf6" font-size="14" font-weight="600">Agent Bricks</text>
  <text x="520" y="182" fill="#9aa6c4" font-size="12">triage + extraction agents, case memory</text>

  <!-- AI Gateway (AI) -->
  <rect x="500" y="230" width="360" height="64" rx="10" fill="#161d2e" stroke="#8b7cf6" stroke-width="1.5"/>
  <text x="520" y="258" fill="#8b7cf6" font-size="14" font-weight="600">Unity AI Gateway + FMAPI</text>
  <text x="520" y="280" fill="#9aa6c4" font-size="12">guardrails, budgets, provider fallback</text>

  <!-- MLflow (AI) -->
  <rect x="500" y="324" width="360" height="64" rx="10" fill="#161d2e" stroke="#8b7cf6" stroke-width="1.5"/>
  <text x="520" y="352" fill="#8b7cf6" font-size="14" font-weight="600">MLflow 3</text>
  <text x="520" y="374" fill="#9aa6c4" font-size="12">tracing, evals, judges</text>

  <!-- Git + Jobs (data) -->
  <rect x="60" y="410" width="800" height="48" rx="10" fill="#161d2e" stroke="#00b39f" stroke-width="1.5"/>
  <text x="80" y="440" fill="#00b39f" font-size="14" font-weight="600">Git folder + Jobs</text>
  <text x="300" y="440" fill="#9aa6c4" font-size="12">detections-as-code, scheduled detection Job</text>

  <!-- connectors -->
  <line x1="240" y1="200" x2="240" y2="230" stroke="#2a3450" stroke-width="1.5"/>
  <line x1="240" y1="294" x2="240" y2="324" stroke="#2a3450" stroke-width="1.5"/>
  <line x1="420" y1="165" x2="500" y2="165" stroke="#2a3450" stroke-width="1.5"/>
  <line x1="680" y1="200" x2="680" y2="230" stroke="#2a3450" stroke-width="1.5"/>
  <line x1="680" y1="294" x2="680" y2="324" stroke="#2a3450" stroke-width="1.5"/>
  <line x1="460" y1="200" x2="460" y2="470" stroke="#ff6b5c" stroke-width="1.5" stroke-dasharray="4 4"/>
</svg>
