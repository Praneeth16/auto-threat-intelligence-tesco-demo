<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" font-family="Inter, system-ui, sans-serif">
  <rect width="980" height="420" fill="#0f1420"/>
  <text x="40" y="44" fill="#eef2fb" font-size="22" font-weight="700" font-family="Space Grotesk, sans-serif">Runtime flow</text>
  <text x="40" y="66" fill="#9aa6c4" font-size="13">Director console to enrich+score to agent to policy router to auto-lane or approval queue; verdicts loop back.</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5f6b8a"/>
    </marker>
  </defs>

  <!-- 1 Director Console (human) -->
  <rect x="40" y="110" width="150" height="60" rx="10" fill="#161d2e" stroke="#ff6b5c" stroke-width="1.5"/>
  <text x="115" y="138" fill="#ff6b5c" font-size="13" text-anchor="middle" font-weight="600">Director</text>
  <text x="115" y="156" fill="#9aa6c4" font-size="11" text-anchor="middle">Console (Run)</text>

  <!-- 2 Lakeflow enrich+score (data) -->
  <rect x="230" y="110" width="170" height="60" rx="10" fill="#161d2e" stroke="#00b39f" stroke-width="1.5"/>
  <text x="315" y="134" fill="#00b39f" font-size="13" text-anchor="middle" font-weight="600">Lakeflow</text>
  <text x="315" y="152" fill="#9aa6c4" font-size="11" text-anchor="middle">enrich + score (FMAPI)</text>

  <!-- 3 Agent Bricks (AI) -->
  <rect x="440" y="110" width="170" height="60" rx="10" fill="#161d2e" stroke="#8b7cf6" stroke-width="1.5"/>
  <text x="525" y="134" fill="#8b7cf6" font-size="13" text-anchor="middle" font-weight="600">Agent Bricks triage</text>
  <text x="525" y="152" fill="#9aa6c4" font-size="11" text-anchor="middle">tool loop, grounded brief</text>

  <!-- 4 Policy router (data) -->
  <rect x="650" y="110" width="150" height="60" rx="10" fill="#161d2e" stroke="#00b39f" stroke-width="1.5"/>
  <text x="725" y="134" fill="#00b39f" font-size="13" text-anchor="middle" font-weight="600">Policy router</text>
  <text x="725" y="152" fill="#9aa6c4" font-size="11" text-anchor="middle">tier x confidence</text>

  <!-- 5a auto-execute (data) -->
  <rect x="840" y="60" width="110" height="54" rx="10" fill="#161d2e" stroke="#00b39f" stroke-width="1.5"/>
  <text x="895" y="84" fill="#00b39f" font-size="12" text-anchor="middle" font-weight="600">Auto-lane</text>
  <text x="895" y="101" fill="#9aa6c4" font-size="10" text-anchor="middle">audited, reversible</text>

  <!-- 5b approval queue (human) -->
  <rect x="840" y="160" width="110" height="54" rx="10" fill="#161d2e" stroke="#ff6b5c" stroke-width="1.5"/>
  <text x="895" y="184" fill="#ff6b5c" font-size="12" text-anchor="middle" font-weight="600">Approval</text>
  <text x="895" y="201" fill="#9aa6c4" font-size="10" text-anchor="middle">reason codes, OBO</text>

  <!-- loop-back (AI) -->
  <rect x="360" y="300" width="300" height="60" rx="10" fill="#161d2e" stroke="#8b7cf6" stroke-width="1.5"/>
  <text x="510" y="324" fill="#8b7cf6" font-size="13" text-anchor="middle" font-weight="600">MLflow evals, agent memory, policy store</text>
  <text x="510" y="344" fill="#9aa6c4" font-size="11" text-anchor="middle">verdicts become training data</text>

  <!-- arrows -->
  <line x1="190" y1="140" x2="228" y2="140" stroke="#5f6b8a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="140" x2="438" y2="140" stroke="#5f6b8a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="610" y1="140" x2="648" y2="140" stroke="#5f6b8a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="126" x2="838" y2="96" stroke="#5f6b8a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="154" x2="838" y2="184" stroke="#5f6b8a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- verdict loop-back to agent + policy -->
  <line x1="895" y1="214" x2="895" y2="330" stroke="#8b7cf6" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="895" y1="330" x2="662" y2="330" stroke="#8b7cf6" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <line x1="360" y1="330" x2="315" y2="330" stroke="#8b7cf6" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="315" y1="330" x2="315" y2="172" stroke="#8b7cf6" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
</svg>
